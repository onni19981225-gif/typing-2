<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小亞諾英文單字王</title>
    <style>
        :root {
            --primary: #3B7FB9; 
            --secondary: #B5EAD7;
            --accent: #FFDAC1; 
            --correct: #2ecc71;
            --wrong: #e74c3c;
            --text: #444;
            
            /* 指法顏色區域 */
            --f-l4: #FFD1DC; --f-l3: #FFECB3; --f-l2: #C8E6C9; --f-l1: #BBDEFB;
            --f-r1: #D1C4E9; --f-r2: #F8BBD0; --f-r3: #DCEDC8; --f-r4: #E0F2F1;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Microsoft JhengHei', sans-serif;
            background-color: #EBF5FB;
            margin: 0; display: flex; height: 100vh; overflow: hidden;
        }

        /* 側邊欄與按鈕 */
        .menu-toggle {
            position: fixed; left: 20px; top: 20px; font-size: 30px; cursor: pointer;
            z-index: 2000; background: white; border: none;
            color: var(--primary); border-radius: 50%; width: 55px; height: 55px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        #sidebar {
            width: 280px; height: 100vh; background-color: white;
            box-shadow: 4px 0 20px rgba(0,0,0,0.15);
            position: fixed; left: -350px; transition: 0.4s; z-index: 1500;
        }
        #sidebar.open { left: 0; }
        .sidebar-content { padding: 80px 20px 20px; display: flex; flex-direction: column; gap: 15px; }
        .btn {
            width: 100%; background-color: var(--secondary); border: none; padding: 15px;
            border-radius: 15px; font-size: 1.1rem; cursor: pointer; font-weight: bold;
            color: #4A7C6E; box-shadow: 0 4px 0 #95CBB9; font-family: inherit;
        }

        #main-view { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; width: 100%; }

        /* 頂部資訊欄 */
        #top-info-bar { position: absolute; top: 30px; width: 85%; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        #timer-display { font-size: 2.2rem; font-weight: bold; color: #FF6B6B; display: none; min-width: 150px; text-align: right;}
        #counter-display { font-size: 2.2rem; font-weight: bold; color: #3B7FB9; display: none; }

        /* 鍵盤樣式優化 */
        #keyboard-area { display: none; text-align: center; width: 95%; max-width: 900px; margin-top: 20px; }
        .keyboard { background: #E0E0E0; padding: 15px; border-radius: 20px; box-shadow: inset 0 0 10px rgba(0,0,0,0.1); }
        .kb-row { display: flex; gap: 8px; justify-content: center; margin-bottom: 8px; }
        .key {
            width: 60px; height: 60px; background: white; border-radius: 12px;
            display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: bold;
            border-bottom: 6px solid #bbb; transition: 0.1s; color: #444; position: relative;
        }
        .key.f-key::after, .key.j-key::after { content: ''; position: absolute; bottom: 12px; width: 20px; height: 3px; background: #999; border-radius: 2px; }

        /* 亮紅 + 放大動畫 */
        .key.highlight {
            background: #FF4D4D !important; color: white !important;
            border-color: #B30000; transform: scale(1.3); z-index: 50;
            box-shadow: 0 0 25px rgba(255, 77, 77, 0.8); border-bottom-width: 2px;
        }

        /* 遊戲區域 */
        #word-area { text-align: center; display: none; width: 100%; }
        #word-display { font-size: 8vw; max-font-size: 100px; font-weight: bold; margin-bottom: 10px; letter-spacing: 6px; color: #ddd; }
        #input-box { font-size: 2.5rem; padding: 12px 30px; border-radius: 60px; border: 6px solid var(--primary); outline: none; text-align: center; width: 80%; max-width: 450px; font-family: inherit; }

        /* 模式視窗 */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 2500; }
        .modal-content { background: white; padding: 30px; border-radius: 35px; width: 85%; max-width: 480px; text-align: center; border: 10px solid var(--accent); font-family: inherit; }
        #result-layer { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.98); flex-direction: column; align-items: center; justify-content: center; z-index: 3000; text-align: center; }

        /* 錯誤晃動 */
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        .shake-error { animation: shake 0.2s ease-in-out; color: var(--wrong) !important; }

        .char-correct { color: var(--correct); }
        .char-wrong { color: var(--wrong); text-decoration: underline; }
    </style>
</head>
<body>

    <button class="menu-toggle" onclick="toggleSidebar()">☰</button>

    <div id="sidebar">
        <div class="sidebar-content">
            <button class="btn" style="background: var(--accent);" onclick="prepareBeginnerMode()">⌨️ 初心者模式</button>
            <button class="btn" onclick="openRandomModal('easy')">🌱 簡單模式</button>
            <button class="btn" onclick="openRandomModal('normal')">🌿 基礎模式</button>
            <button class="btn" onclick="openRandomModal('hard')">🌳 困難模式</button>
            <button class="btn" style="background: #E2F0CB;" onclick="showCustomModal()">✏️ 自訂單字庫</button>
            <button class="btn" style="background:#ddd;" onclick="location.reload()">🏠 回首頁</button>
        </div>
    </div>

    <div id="main-view">
        <div id="top-info-bar">
            <div id="counter-display">正確：0</div>
            <div id="timer-display">時間：--:--</div>
        </div>

        <div id="home-logo">
            <div class="logo-icon">🐋</div>
            <div class="logo-text">小亞諾英文單字王</div>
            <p>點擊左上角 ☰ 開始練習</p>
        </div>

        <div id="pre-game-start" style="display:none;">
            <h1 id="pre-title" style="color: var(--primary); font-size: 3rem;"></h1>
            <p id="pre-desc"></p>
            <button class="btn" style="width: 200px; font-size: 1.5rem;" onclick="actualStartGame()">出發！</button>
        </div>

        <div id="word-area">
            <div id="word-display">READY?</div>
            <div id="translation-display" style="font-size: 2rem; color: #777; margin-bottom: 20px;"></div>
            <input type="text" id="input-box" placeholder="輸入單字" autocomplete="off">
        </div>

        <div id="keyboard-area">
            <h1 id="kb-target" style="font-size: 5rem; color: #FF4D4D; margin: 0;">?</h1>
            <div class="keyboard" id="virtual-keyboard"></div>
        </div>
    </div>

    <div id="random-modal" class="modal"><div class="modal-content"><h3 id="random-title"></h3><p>設定時間 (分鐘)：<br><input type="number" id="random-minutes" value="1" min="1" style="width:80px; font-size:1.8rem; text-align:center;"></p><button class="btn" onclick="confirmRandomChallenge()">準備好了！</button></div></div>
    
    <div id="custom-modal" class="modal"><div class="modal-content"><h3>自訂單字庫</h3><div id="saved-lists-display"></div><button class="btn" onclick="hideModal('custom-modal')">關閉</button></div></div>

    <div id="result-layer">
        <h1 style="font-size:5rem;">🏁 結束！</h1>
        <div id="result-detail" style="font-size:2rem; margin-bottom:30px;"></div>
        <button class="btn" style="width:200px;" onclick="location.reload()">回到主畫面</button>
    </div>

    <script>
        const fingerMap = {
            'Q':'l4','A':'l4','Z':'l4','W':'l3','S':'l3','X':'l3','E':'l2','D':'l2','C':'l2','R':'l1','F':'l1','V':'l1','T':'l1','G':'l1','B':'l1',
            'Y':'r1','H':'r1','N':'r1','U':'r1','J':'r1','M':'r1','I':'r2','K':'r2','O':'r3','L':'r3','P':'r4'
        };
        const kbRows = [["Q","W","E","R","T","Y","U","I","O","P"], ["A","S","D","F","G","H","J","K","L"], ["Z","X","C","V","B","N","M"]];

        let gameState = { mode:'', subMode:'', timeLeft: 0, timer: null, score: 0, targetChar: '', active: false };

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        function hideModal(id) { document.getElementById(id).style.display = 'none'; }

        function updateTimerUI(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            document.getElementById('timer-display').innerText = `時間：${m}:${s.toString().padStart(2, '0')}`;
        }

        function clearUI() {
            gameState.active = false;
            if(gameState.timer) clearInterval(gameState.timer);
            gameState.timer = null;
            
            // 關鍵修正：在切換畫面前，立刻隱藏舊資訊
            document.getElementById('home-logo').style.display = 'none';
            document.getElementById('pre-game-start').style.display = 'none';
            document.getElementById('word-area').style.display = 'none';
            document.getElementById('keyboard-area').style.display = 'none';
            document.getElementById('timer-display').style.display = 'none';
            document.getElementById('counter-display').style.display = 'none';
        }

        // --- 初心者模式 ---
        function prepareBeginnerMode() {
            clearUI();
            toggleSidebar();
            gameState.mode = 'beginner';
            gameState.timeLeft = 60; // 先設定好邏輯時間
            
            // 關鍵修正：進入準備畫面就先同步 UI
            updateTimerUI(60); 
            document.getElementById('timer-display').style.display = 'block';
            document.getElementById('counter-display').style.display = 'block';
            document.getElementById('counter-display').innerText = "正確：0";

            document.getElementById('pre-title').innerText = "⌨️ 初心者指法練習";
            document.getElementById('pre-desc').innerText = "請根據顏色使用正確的手指按鍵！";
            document.getElementById('pre-game-start').style.display = 'block';
            
            initKeyboard(); // 預先生成鍵盤
        }

        function initKeyboard() {
            const kb = document.getElementById('virtual-keyboard');
            kb.innerHTML = '';
            kbRows.forEach(row => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'kb-row';
                row.forEach(key => {
                    const kDiv = document.createElement('div');
                    kDiv.className = 'key' + (key==='F'?' f-key':'') + (key==='J'?' j-key':'');
                    kDiv.id = `key-${key}`;
                    kDiv.innerText = key;
                    if(fingerMap[key]) kDiv.style.backgroundColor = `var(--f-${fingerMap[key]})`;
                    rowDiv.appendChild(kDiv);
                });
                kb.appendChild(rowDiv);
            });
        }

        function nextChar() {
            document.querySelectorAll('.key').forEach(k => k.classList.remove('highlight'));
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            gameState.targetChar = chars[Math.floor(Math.random() * chars.length)];
            document.getElementById('kb-target').innerText = gameState.targetChar;
            const targetEl = document.getElementById(`key-${gameState.targetChar}`);
            if(targetEl) targetEl.classList.add('highlight');
        }

        // --- 核心遊戲流程 ---
        function actualStartGame() {
            document.getElementById('pre-game-start').style.display = 'none';
            gameState.active = true;
            gameState.score = 0;

            if(gameState.mode === 'beginner') {
                document.getElementById('keyboard-area').style.display = 'block';
                nextChar();
            }
            
            // 啟動計時器
            if(gameState.timer) clearInterval(gameState.timer);
            gameState.timer = setInterval(() => {
                gameState.timeLeft--;
                updateTimerUI(gameState.timeLeft); // 每秒精準更新
                if(gameState.timeLeft <= 0) endGame();
            }, 1000);
        }

        window.addEventListener('keydown', (e) => {
            if(!gameState.active || gameState.mode !== 'beginner') return;
            const key = e.key.toUpperCase();
            if(key === gameState.targetChar) {
                gameState.score++;
                document.getElementById('counter-display').innerText = `正確：${gameState.score}`;
                nextChar();
            } else if (!['SHIFT','CONTROL','ALT','META','CAPSLOCK'].includes(key)) {
                playErrorSound();
            }
        });

        function playErrorSound() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator(); osc.frequency.setValueAtTime(150, ctx.currentTime);
            const g = ctx.createGain(); g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
            osc.connect(g); g.connect(ctx.destination);
            osc.start(); osc.stop(ctx.currentTime + 0.1);
            
            const target = (gameState.mode === 'beginner') ? document.getElementById('kb-target') : document.getElementById('word-display');
            target.classList.add('shake-error');
            setTimeout(() => target.classList.remove('shake-error'), 200);
        }

        function endGame() {
            gameState.active = false;
            clearInterval(gameState.timer);
            document.getElementById('result-detail').innerText = `總共獲得了 ${gameState.score} 分！`;
            document.getElementById('result-layer').style.display = 'flex';
        }

        function openRandomModal(diff) {
            gameState.currentDifficulty = diff;
            document.getElementById('random-title').innerText = diff.toUpperCase() + " 模式";
            document.getElementById('random-modal').style.display = 'flex';
        }

        function confirmRandomChallenge() {
            const mins = parseInt(document.getElementById('random-minutes').value) || 1;
            hideModal('random-modal');
            clearUI();
            gameState.mode = 'word';
            gameState.timeLeft = mins * 60;
            updateTimerUI(gameState.timeLeft); // 立即同步 UI
            document.getElementById('timer-display').style.display = 'block';
            document.getElementById('counter-display').style.display = 'block';
            document.getElementById('pre-title').innerText = "單字限時挑戰";
            document.getElementById('pre-desc').innerText = `時間：${mins} 分鐘，準備好就出發！`;
            document.getElementById('pre-game-start').style.display = 'block';
        }
    </script>
</body>
</html>
